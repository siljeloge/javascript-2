<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feed - Social Media</title>
    <link rel="stylesheet" href="social-media-app/css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a href="profile.html">Profile</a>
        <a href="index.html" class="active">Feed</a>
        <a href="login.html">Login</a>
        <a href="register.html">Register</a>
        <button id="logoutBtn">Logout</button>
      </nav>
    </header>
    <h1>Social Feed</h1>
    <form id="createPostForm">
      <input type="text" id="postTitle" placeholder="Post title" required />
      <textarea
        id="postBody"
        placeholder="Write something..."
        required
      ></textarea>
      <button type="submit">Create post</button>
    </form>
    <input type="text" id="searchInput" placeholder="Search posts..." />
    <div id="posts"></div>
    <footer>
      <p>&copy; 2026 Social Media App</p>
    </footer>
    <script type="module" src="social-media-app/js/logout.js"></script>
    <script type="module" src="social-media-app/js/index.js"></script>
  </body>
</html>
